<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бардак — Макет v2 (зоны)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e; display:flex; flex-direction:column; align-items:center;
  min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding:12px 0 40px;
}
h1 { color:#888; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding-bottom:10px; }

.controls { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }
.controls button {
  background:#2a2a4a; border:1px solid #444; color:#aaa;
  padding:4px 11px; border-radius:16px; font-size:11px; cursor:pointer;
}
.controls button.active { background:#4a9eff; border-color:#4a9eff; color:#fff; }
.controls select {
  background:#2a2a4a; border:1px solid #444; color:#aaa;
  padding:4px 8px; border-radius:16px; font-size:11px; cursor:pointer;
}
.btn-zones { background:#7b2fbe !important; border-color:#7b2fbe !important; color:#fff !important; }
.btn-zones.on { background:#9b59b6 !important; border-color:#e8b4f8 !important; box-shadow:0 0 10px rgba(155,89,182,.5); }

/* ── ZONE CONSTANTS ───────────────────────────────────────────
   Phone: 390 × 844 px
   TOP_BAR   : y=0..44    h=44
   TOP_OPPS  : y=44..174  h=130   full width, up to 2 bots
   MIDDLE    : y=174..458 h=284   3 columns:
                 DECK  x=0..84    w=84
                 TABLE x=84..294  w=210
                 SIDE  x=294..390 w=96   up to 3 bots
   ACTION    : y=458..508 h=50    Взять / Бито + Бита
   THROWN    : y=508..558 h=50    накинутые мне (скрыта если пусто)
   BADGE     : y=558..598 h=40    «Вы» + роль
   HAND      : y=598..794 h=196   рука
   SAFE      : y=794..844 h=50    safe area
   ──────────────────────────────────────────────────────────── */
:root {
  --secret-bg: linear-gradient(135deg,#4a1480 0%,#7c2fd4 100%);
  --phone-bg : radial-gradient(ellipse at 50% 40%,#3e7055 0%,#255040 55%,#142e28 100%);
}

/* ── PHONE FRAME ── */
.phone {
  width:390px; height:844px;
  background-image:var(--phone-bg);
  border-radius:44px; overflow:hidden; position:relative; flex-shrink:0;
  box-shadow:0 0 0 8px #111,0 0 0 10px #333,0 40px 80px rgba(0,0,0,.8);
}
.notch {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:120px; height:34px; background:#111; border-radius:0 0 20px 20px; z-index:200;
}

/* ── ZONE OVERLAYS (debug) ── */
.zones-wrap { display:none; }
.phone.zones-on .zones-wrap { display:block; }
.zone-box {
  position:absolute; pointer-events:none; z-index:300;
  border:1.5px dashed; font-size:9px; font-weight:700;
  letter-spacing:.4px; padding:2px 4px; text-transform:uppercase;
}
.zb.top-bar { top:0;    left:0; right:0;  height:44px;  border-color:rgba(255,255,80,.7);  color:rgba(255,255,80,.9);  background:rgba(255,255,80,.07); }
.zb.top-bots{ top:44px; left:0; right:0;  height:130px; border-color:rgba(80,200,255,.7);  color:rgba(80,200,255,.9);  background:rgba(80,200,255,.07); }
.zb.deck    { top:174px;left:0; width:84px; height:284px; border-color:rgba(255,140,40,.7);  color:rgba(255,140,40,.9);  background:rgba(255,140,40,.07); }
.zb.table   { top:174px;left:84px;width:210px;height:284px;border-color:rgba(80,220,80,.7);  color:rgba(80,220,80,.9);   background:rgba(80,220,80,.07); }
.zb.side    { top:174px;right:0; width:96px; height:284px; border-color:rgba(255,80,200,.7);  color:rgba(255,80,200,.9);  background:rgba(255,80,200,.07); }
.zb.action  { top:458px;left:0; right:0;  height:50px;  border-color:rgba(255,180,80,.7);  color:rgba(255,180,80,.9);  background:rgba(255,180,80,.07); }
.zb.thrown  { top:508px;left:0; right:0;  height:50px;  border-color:rgba(200,80,255,.7);  color:rgba(200,80,255,.9);  background:rgba(200,80,255,.07); }
.zb.badge   { top:558px;left:0; right:0;  height:40px;  border-color:rgba(80,255,180,.7);  color:rgba(80,255,180,.9);  background:rgba(80,255,180,.07); }
.zb.hand    { top:598px;left:0; right:0;  height:196px; border-color:rgba(255,255,255,.4);  color:rgba(255,255,255,.6);  background:rgba(255,255,255,.04); }
.zb.safe    { top:794px;left:0; right:0;  height:50px;  border-color:rgba(150,150,150,.5);  color:rgba(150,150,150,.7);  background:rgba(150,150,150,.05); }

/* ── TOP BAR ── */
.top-bar {
  position:absolute; top:0; left:0; right:0; height:44px;
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px 0;
  background:rgba(0,0,0,.15); z-index:50;
}
.top-title { font-size:14px; font-weight:900; color:#f1c40f; letter-spacing:2px; }
.top-menu  { background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.2); color:#fff; padding:4px 11px; border-radius:12px; font-size:11px; font-weight:700; }

/* ── TOP OPPONENTS ZONE ── */
.top-opps-zone {
  position:absolute; top:44px; left:0; right:0; height:130px;
  z-index:20;
}

/* ── DECK ZONE ── */
.deck-zone {
  position:absolute; top:174px; left:0; width:84px; height:284px;
  z-index:15;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
}
.deck-count  { color:#fff; font-size:14px; font-weight:900; text-shadow:0 2px 6px rgba(0,0,0,.8); line-height:1; }
.deck-stack  { position:relative; width:62px; height:92px; }
.d-back {
  position:absolute; width:44px; height:64px; border-radius:6px;
  background:linear-gradient(145deg,#1a3f7a,#2560bd);
  border:1.5px solid rgba(255,255,255,.26); box-shadow:2px 2px 6px rgba(0,0,0,.5);
}
.d-back:nth-child(1){top:4px;left:0}
.d-back:nth-child(2){top:2px;left:1.5px}
.d-back:nth-child(3){top:0;left:3px}
.trump-card-peek {
  position:absolute; width:50px; height:34px; border-radius:5px;
  background:#fefefe; border:1px solid rgba(0,0,0,.15);
  left:36px; top:16px;
  display:flex; flex-direction:column; align-items:flex-start; padding:2px 3px;
  font-size:13px; font-weight:900; color:#c0392b;
  box-shadow:2px 2px 8px rgba(0,0,0,.5); z-index:1;
}
.secret-under {
  position:absolute; width:50px; height:34px; border-radius:5px;
  background:var(--secret-bg); border:1px solid rgba(200,160,255,.4);
  left:28px; top:30px; box-shadow:2px 2px 6px rgba(0,0,0,.6); z-index:0;
}
.trump-lbl { font-size:7px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:1px; }

/* ── TABLE ZONE ── */
.table-zone {
  position:absolute; top:174px; left:84px; width:210px; height:284px;
  z-index:10;
  padding:8px 4px 0;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.table-label {
  font-size:9px; font-weight:700; color:#f1c40f;
  background:rgba(0,0,0,.45); padding:2px 9px; border-radius:8px;
  border:1px solid rgba(241,196,15,.3); white-space:nowrap; line-height:1.5;
  align-self:center;
}
.table-grid {
  display:grid; grid-template-columns:repeat(3,62px); gap:7px;
}
.table-pair { position:relative; width:62px; height:96px; }
.tc {
  position:absolute; top:0; left:0;
  width:58px; height:82px; border-radius:6px;
  background:#fefefe; border:1px solid rgba(0,0,0,.12);
  box-shadow:0 4px 12px rgba(0,0,0,.5);
  display:flex; flex-direction:column; justify-content:space-between;
  padding:3px 3px; font-size:10px; font-weight:900; color:#111;
}
.tc.red   { color:#c0392b; }
.tc.def   { top:13px; left:4px; transform:rotate(11deg); border:2px solid #27ae60; z-index:2; }
.tc.xfer  { box-shadow:0 4px 12px rgba(0,0,0,.5),0 0 0 2px #9b59b6,0 0 14px rgba(155,89,182,.4); }
.tc-suit  { text-align:center; font-size:16px; line-height:1; }
.xfer-slot {
  position:absolute; top:0; left:0; width:58px; height:82px; border-radius:6px;
  border:2px dashed rgba(155,89,182,.7); background:rgba(155,89,182,.07);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:rgba(155,89,182,.7);
}

/* ── SIDE BOTS ZONE ── */
.side-zone {
  position:absolute; top:174px; right:0; width:96px; height:284px;
  z-index:20;
}

/* ── OPPONENT BLOCK ── */
.opp-block {
  position:absolute; right:0;
  display:flex; flex-direction:column; align-items:flex-end; gap:1px;
  padding-right:5px;
}
.opp-name  { font-size:9px; color:rgba(255,255,255,.9); font-weight:700; white-space:nowrap; line-height:1.4; }
.opp-count { font-size:7px; color:rgba(255,255,255,.5); font-weight:600; }
.opp-role  { font-size:7px; font-weight:800; padding:1px 5px; border-radius:7px; text-transform:uppercase; letter-spacing:.4px; }
.opp-role.atk { background:#c0392b; color:#fff; }
.opp-role.def { background:#27ae60; color:#fff; }
.opp-hand-row { display:flex; align-items:flex-end; gap:3px; }
.opp-fan { position:relative; flex-shrink:0; }
.fan-c {
  position:absolute;
  border-radius:3px;
  background:linear-gradient(145deg,#1a3f7a,#2560bd);
  border:1px solid rgba(255,255,255,.22);
  box-shadow:0 2px 5px rgba(0,0,0,.5);
}
.sec-card {
  border-radius:3px; background:var(--secret-bg);
  border:1px solid rgba(200,160,255,.35); box-shadow:0 2px 6px rgba(0,0,0,.6); flex-shrink:0;
}
.opp-thrown-row { position:relative; margin-top:2px; }
.oth-c {
  position:absolute; top:0; border-radius:3px;
  background:#fefefe; border:1px solid rgba(0,0,0,.2); box-shadow:1px 1px 4px rgba(0,0,0,.5);
  display:flex; flex-direction:column; padding:1px 2px;
  font-size:7px; font-weight:900; line-height:1.2; color:#111;
}
.oth-c.red { color:#c0392b; }

/* Top opponent blocks are positioned differently */
.top-opp {
  position:absolute; top:6px;
  display:flex; flex-direction:column; align-items:center; gap:1px;
  transform:translateX(-50%);
}
.top-opp .opp-hand-row { flex-direction:row; }

/* ── ACTION ZONE ── */
.action-zone {
  position:absolute; top:458px; left:0; right:0; height:50px;
  display:flex; align-items:center; justify-content:center;
  gap:8px; padding:0 8px; z-index:30;
}
.btn-take {
  width:56px; height:40px; background:#e74c3c; border:none; border-radius:10px;
  font-size:11px; font-weight:900; color:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.5); cursor:pointer; flex-shrink:0;
}
.btn-main {
  padding:9px 18px; border-radius:18px; font-size:12px; font-weight:800; letter-spacing:.5px;
  border:none; cursor:pointer; box-shadow:0 4px 12px rgba(0,0,0,.4);
  background:#27ae60; color:#fff; flex-shrink:0;
}
.btn-main.take-mode { background:#e74c3c; }
.bita-badge {
  margin-left:auto;
  display:flex; flex-direction:column; align-items:center; gap:1px; padding-right:4px;
}
.bita-mini-stack { position:relative; width:32px; height:42px; }
.bita-mini {
  position:absolute; width:28px; height:38px; border-radius:4px;
  background:linear-gradient(145deg,#1a4f20,#2e7d32); border:1px solid rgba(0,0,0,.1);
}
.bita-cnt { font-size:7px; font-weight:700; color:rgba(255,255,255,.5); text-transform:uppercase; }

/* ── THROWN-TO-ME ZONE ── */
.thrown-zone {
  position:absolute; top:508px; left:0; right:0; height:50px;
  z-index:25;
  display:flex; align-items:center;
  padding:0 10px; gap:8px;
}
.thrown-zone.empty { opacity:0; pointer-events:none; } /* reserve space, hide visually */
.thrown-lbl { font-size:9px; font-weight:700; color:#f1c40f; text-shadow:0 1px 3px rgba(0,0,0,.8); white-space:nowrap; flex-shrink:0; }
.thrown-cards-row { position:relative; flex-shrink:0; }
.thr-c {
  position:absolute; top:0; border-radius:4px;
  background:#fefefe; border:1px solid rgba(0,0,0,.2); box-shadow:1px 2px 5px rgba(0,0,0,.5);
  display:flex; flex-direction:column; padding:2px 3px;
  font-size:9px; font-weight:900; line-height:1.2; color:#111;
}
.thr-c.red { color:#c0392b; }

/* ── HUMAN BADGE ZONE ── */
.badge-zone {
  position:absolute; top:558px; left:0; right:0; height:40px;
  display:flex; align-items:center; justify-content:center;
  gap:8px; z-index:25;
}
.my-plate {
  background:rgba(30,130,70,.9); border:1px solid rgba(255,255,255,.18);
  border-radius:12px; padding:4px 13px;
  display:flex; flex-direction:column; align-items:center; line-height:1.3;
}
.my-plate.atk { background:rgba(180,30,30,.9); }
.my-plate.def { background:rgba(30,100,160,.9); }
.my-name  { font-size:11px; font-weight:900; color:#fff; }
.my-cnt   { font-size:8px; color:rgba(255,255,255,.7); }
.role-pill {
  font-size:10px; font-weight:800; padding:4px 12px; border-radius:12px;
  text-transform:uppercase; letter-spacing:.5px; border:none;
}
.role-pill.atk { background:#e74c3c; color:#fff; }
.role-pill.def { background:#2980b9; color:#fff; }

/* ── HAND ZONE ── */
.hand-zone {
  position:absolute; top:598px; left:0; right:0; height:196px;
  z-index:25; overflow:hidden;
}
.hand-fan { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:100%; height:168px; }
.hand-card {
  position:absolute; width:68px; height:96px; border-radius:8px;
  background:#fefefe; border:1px solid rgba(0,0,0,.12);
  box-shadow:0 6px 18px rgba(0,0,0,.5);
  display:flex; flex-direction:column; justify-content:space-between;
  padding:4px; font-size:13px; font-weight:900;
  transform-origin:bottom center; bottom:0;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1); cursor:pointer; user-select:none;
}
.hand-card.red { color:#c0392b; }
.hand-card.lifted { box-shadow:0 20px 40px rgba(0,0,0,.7) !important; z-index:60 !important; }
.hand-card .hsc { text-align:center; font-size:22px; line-height:1; }
/* Player secret card — right edge of hand zone, above home bar */
.my-secret {
  position:absolute; right:8px; bottom:55px;
  width:34px; height:48px; border-radius:6px;
  background:var(--secret-bg); border:1px solid rgba(200,160,255,.4);
  box-shadow:0 4px 14px rgba(0,0,0,.6); z-index:26;
  display:flex; align-items:center; justify-content:center;
  font-size:7px; color:rgba(200,160,255,.8); font-weight:700; text-align:center; line-height:1.3;
}

/* ── BOTTOM SAFE AREA ── */
.safe-bar {
  position:absolute; bottom:0; left:0; right:0; height:34px;
  display:flex; align-items:center; justify-content:center;
}
.home-indicator { width:100px; height:4px; background:rgba(255,255,255,.25); border-radius:2px; }
</style>
</head>
<body>
<h1>Бардак — Новый Макет v2 (зоны)</h1>

<div class="controls">
  <button onclick="setCount(2)" class="active" id="btn2">2 игрока</button>
  <button onclick="setCount(3)" id="btn3">3 игрока</button>
  <button onclick="setCount(4)" id="btn4">4 игрока</button>
  <button onclick="setCount(5)" id="btn5">5 игроков</button>
  <button onclick="setCount(6)" id="btn6">6 игроков</button>
  <button class="btn-zones" onclick="toggleZones(this)" id="zoneBtn">🗺 Зоны</button>
  <select id="scenSel" onchange="setScenario(this.value)">
    <option value="attack">Атака</option>
    <option value="defense">Защита</option>
    <option value="transfer">Перевод</option>
    <option value="thrown_to_me">Накинули мне</option>
  </select>
  <label style="color:#aaa;font-size:11px;display:flex;align-items:center;gap:4px">
    <input type="checkbox" id="maxTable" onchange="render()"> 6 пар
  </label>
</div>

<div class="phone" id="phone">
  <div class="notch"></div>

  <!-- Zone overlays -->
  <div class="zones-wrap">
    <div class="zone-box zb top-bar">TOP BAR</div>
    <div class="zone-box zb top-bots">ПРОТИВНИКИ (верх)</div>
    <div class="zone-box zb deck">КОЛОДА</div>
    <div class="zone-box zb table">СТОЛ</div>
    <div class="zone-box zb side">БОТ ПРАВЫЕ</div>
    <div class="zone-box zb action">КНОПКИ</div>
    <div class="zone-box zb thrown">НАКИНУТО МНЕ</div>
    <div class="zone-box zb badge">ВЫ</div>
    <div class="zone-box zb hand">РУКА</div>
    <div class="zone-box zb safe">SAFE AREA</div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-title">БАРДАК</span>
    <button class="top-menu">☰ Меню</button>
  </div>

  <!-- Top opponents -->
  <div class="top-opps-zone" id="topOpps"></div>

  <!-- Deck + Trump -->
  <div class="deck-zone">
    <div class="deck-count" id="deckCount">24</div>
    <div class="deck-stack">
      <div class="d-back"></div>
      <div class="d-back"></div>
      <div class="d-back"></div>
      <div class="secret-under"></div>
      <div class="trump-card-peek">♠<span style="font-size:9px">7</span></div>
    </div>
    <div class="trump-lbl">Козырь</div>
  </div>

  <!-- Side bots (right column) -->
  <div class="side-zone" id="sideBots"></div>

  <!-- Table -->
  <div class="table-zone">
    <div class="table-label" id="tableLabel">⚔️ Вы атакуете</div>
    <div class="table-grid" id="tableGrid"></div>
  </div>

  <!-- Action bar -->
  <div class="action-zone">
    <button class="btn-take" id="btnTake">Взять</button>
    <button class="btn-main" id="btnMain">Бито</button>
    <div class="bita-badge">
      <div class="bita-mini-stack">
        <div class="bita-mini" style="top:4px;left:0;transform:rotate(-7deg)"></div>
        <div class="bita-mini" style="top:2px;left:1.5px;transform:rotate(3deg)"></div>
        <div class="bita-mini" style="top:0;left:3px"></div>
      </div>
      <div class="bita-cnt">Бита: 8</div>
    </div>
  </div>

  <!-- Thrown to me zone -->
  <div class="thrown-zone empty" id="thrownZone">
    <span class="thrown-lbl">▼ накинуто вам:</span>
    <div class="thrown-cards-row" id="thrownRow"></div>
  </div>

  <!-- Human badge -->
  <div class="badge-zone">
    <div class="my-plate" id="myPlate">
      <span class="my-name">Вы</span>
      <span class="my-cnt">Карт: 5+1</span>
    </div>
    <div class="role-pill atk" id="myRole">АТАКА</div>
  </div>

  <!-- Hand -->
  <div class="hand-zone">
    <div class="hand-fan" id="handFan"></div>
    <div class="my-secret">⚠<br>Потай-<br>ная</div>
  </div>

  <!-- Home indicator -->
  <div class="safe-bar"><div class="home-indicator"></div></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const BOTS = [
  { name:'Бот 1', count:5,  thrown:[{r:'6',s:'♠',red:false},{r:'6',s:'♥',red:true}] },
  { name:'Бот 2', count:8,  thrown:[] },
  { name:'Бот 3', count:6,  thrown:[{r:'9',s:'♣',red:false},{r:'7',s:'♠',red:false}] },
  { name:'Бот 4', count:12, thrown:[] },
  { name:'Бот 5', count:3,  thrown:[{r:'J',s:'♣',red:false}] },
];
const MY_CARDS = [
  {r:'K',s:'♥',red:true},{r:'6',s:'♥',red:true},{r:'J',s:'♦',red:true},
  {r:'10',s:'♣',red:false},{r:'7',s:'♠',red:false},
];
const SCENARIOS = {
  attack:      { label:'⚔️ Вы атакуете',      mainBtn:'Бито',     role:'atk',
    pairs:[{a:{r:'7',s:'♠',red:false},d:{r:'Q',s:'♦',red:true}},{a:{r:'6',s:'♥',red:true}},{a:{r:'7',s:'♣',red:false}}],
    thrown:[] },
  defense:     { label:'🛡 Вы защищаетесь',   mainBtn:'Взять',    role:'def',
    pairs:[{a:{r:'9',s:'♠',red:false},d:{r:'Q',s:'♦',red:true}},{a:{r:'J',s:'♥',red:true}},{a:{r:'6',s:'♣',red:false}}],
    thrown:[] },
  transfer:    { label:'🔄 Перевод',           mainBtn:'Перевести',role:'def',
    pairs:[{a:{r:'7',s:'♠',red:false},xfer:true},{a:{r:'7',s:'♥',red:true},xfer:true},{slot:true}],
    thrown:[] },
  thrown_to_me:{ label:'📥 Накинули вам',      mainBtn:'Взять',    role:'def',
    pairs:[{a:{r:'9',s:'♠',red:false},d:{r:'Q',s:'♦',red:true}},{a:{r:'9',s:'♥',red:true},d:{r:'K',s:'♠',red:false}}],
    thrown:[{r:'9',s:'♣',red:false},{r:'9',s:'♦',red:true},{r:'6',s:'♠',red:false}] },
};
const TABLE_MAX = [
  {a:{r:'7',s:'♠',red:false},d:{r:'Q',s:'♦',red:true}},{a:{r:'6',s:'♥',red:true},d:{r:'A',s:'♥',red:true}},
  {a:{r:'9',s:'♣',red:false},d:{r:'10',s:'♠',red:false}},{a:{r:'J',s:'♦',red:true},d:{r:'K',s:'♠',red:false}},
  {a:{r:'8',s:'♠',red:false},d:{r:'A',s:'♠',red:false}},{a:{r:'6',s:'♦',red:true},d:{r:'10',s:'♥',red:true}},
];

// ── Layout: always 2 top bots + rest on right side ───────────────────────────
// 2p→1top  3p→2top  4p→2top+1side  5p→2top+2side  6p→2top+3side
const LAYOUTS = {
  2: { top:[0],     side:[] },
  3: { top:[0,1],   side:[] },
  4: { top:[0,1],   side:[2] },
  5: { top:[0,1],   side:[2,3] },
  6: { top:[0,1],   side:[2,3,4] },
};

let count = 2, scenario = 'attack';

// ── Fan builder ───────────────────────────────────────────────────────────────
function makeFan(n, CW, CH, maxOL, flip) {
  const OL   = n > 1 ? Math.min(maxOL, Math.floor((flip ? 55 : 65) / Math.max(n-1,1))) : 0;
  const fanW = OL*(n-1)+CW;
  const div  = document.createElement('div');
  div.className = 'opp-fan';
  div.style.cssText = `width:${fanW}px;height:${CH+8}px;position:relative;flex-shrink:0;`;
  const MAXROT = 18;
  for (let i = 0; i < n; i++) {
    const t  = n > 1 ? i/(n-1) : 0.5;
    const xO = flip ? (fanW - CW - i*OL) : i*OL;
    const c  = document.createElement('div');
    c.className = 'fan-c';
    c.style.cssText = `width:${CW}px;height:${CH}px;top:${(Math.pow(t-.5,2)*7).toFixed(1)}px;left:${xO}px;z-index:${i};` +
      `transform-origin:bottom center;transform:rotate(${((t-.5)*MAXROT*2).toFixed(1)}deg);`;
    div.appendChild(c);
  }
  return div;
}

// ── Opponent block builder ─────────────────────────────────────────────────────
function makeOppBlock(bot, isSide, roleClass) {
  const n   = Math.min(bot.count, 12);
  const CW  = isSide ? 20 : 26, CH = isSide ? 30 : 38;
  const OL  = 8;

  const wrap = document.createElement('div');
  wrap.className = isSide ? 'opp-block' : 'top-opp';

  if (roleClass) {
    const r = document.createElement('div');
    r.className = 'opp-role ' + roleClass;
    r.textContent = roleClass === 'atk' ? 'Атака' : 'Защита';
    wrap.appendChild(r);
  }

  const nm = document.createElement('div'); nm.className='opp-name'; nm.textContent=bot.name; wrap.appendChild(nm);
  const ct = document.createElement('div'); ct.className='opp-count'; ct.textContent=bot.count+' карт'; wrap.appendChild(ct);

  const row = document.createElement('div'); row.className = 'opp-hand-row';
  row.appendChild(makeFan(n, CW, CH, OL, isSide));
  const sec = document.createElement('div');
  sec.className = 'sec-card';
  sec.style.cssText = `width:${CW}px;height:${CH}px;`;
  row.appendChild(sec);
  wrap.appendChild(row);

  if (bot.thrown && bot.thrown.length) {
    const TW=18,TH=26,TV=8,tn=bot.thrown.length;
    const trow = document.createElement('div');
    trow.className = 'opp-thrown-row';
    trow.style.cssText = `width:${TV*(tn-1)+TW}px;height:${TH}px;`;
    bot.thrown.forEach((c,i)=>{
      const el = document.createElement('div');
      el.className = 'oth-c'+(c.red?' red':'');
      el.style.cssText=`left:${i*TV}px;width:${TW}px;height:${TH}px;z-index:${i};`;
      el.innerHTML=`<span>${c.r}</span><span>${c.s}</span>`;
      trow.appendChild(el);
    });
    wrap.appendChild(trow);
  }
  return wrap;
}

// ── Render top bots ────────────────────────────────────────────────────────────
function renderTopBots(indices) {
  const zone = document.getElementById('topOpps');
  zone.innerHTML = '';
  const n = indices.length;
  if (!n) return;
  // Spread across full width avoiding notch (x=135..255 at y<34, but we start at y=44 so no issue)
  indices.forEach((bi, pos) => {
    const cx = n === 1 ? 195 : (pos === 0 ? 115 : 275);
    const el = makeOppBlock(BOTS[bi], false, null);
    el.style.left = cx + 'px';
    zone.appendChild(el);
  });
}

// ── Render side bots ───────────────────────────────────────────────────────────
function renderSideBots(indices) {
  const zone = document.getElementById('sideBots');
  zone.innerHTML = '';
  const n = indices.length;
  if (!n) return;
  const zoneH = 284;
  const slotH = Math.floor(zoneH / n);
  indices.forEach((bi, pos) => {
    const el = makeOppBlock(BOTS[bi], true, null);
    const midY = pos * slotH + Math.floor(slotH / 2);
    el.style.top = midY + 'px';
    el.style.transform = 'translateY(-50%)';
    zone.appendChild(el);
  });
}

// ── Render table ───────────────────────────────────────────────────────────────
function mkCard(c, isDef, isXfer) {
  const el = document.createElement('div');
  el.className = 'tc'+(c.red?' red':'')+(isDef?' def':'')+(isXfer?' xfer':'');
  el.innerHTML = `<div>${c.r}<br>${c.s}</div><div class="tc-suit">${c.s}</div><div style="transform:rotate(180deg)">${c.r}<br>${c.s}</div>`;
  return el;
}

function renderTable() {
  const sc   = SCENARIOS[scenario];
  const grid = document.getElementById('tableGrid');
  const lbl  = document.getElementById('tableLabel');
  grid.innerHTML = '';
  lbl.textContent = sc.label;

  const pairs = document.getElementById('maxTable').checked ? TABLE_MAX : sc.pairs;
  pairs.forEach(p => {
    const pair = document.createElement('div'); pair.className='table-pair';
    if (p.slot) {
      const sl = document.createElement('div'); sl.className='xfer-slot'; sl.textContent='↻';
      pair.appendChild(sl);
    } else {
      pair.appendChild(mkCard(p.a, false, !!p.xfer));
      if (p.d) pair.appendChild(mkCard(p.d, true, false));
    }
    grid.appendChild(pair);
  });

  document.getElementById('btnMain').textContent = sc.mainBtn;
  document.getElementById('btnMain').className   = 'btn-main' + (sc.mainBtn==='Взять'?' take-mode':'');

  const plate = document.getElementById('myPlate');
  const role  = document.getElementById('myRole');
  plate.className = 'my-plate ' + sc.role;
  role.className  = 'role-pill ' + sc.role;
  role.textContent = sc.role === 'atk' ? 'АТАКА' : 'ЗАЩИТА';

  // Thrown to me
  const tzone = document.getElementById('thrownZone');
  const trow  = document.getElementById('thrownRow');
  trow.innerHTML = '';
  if (sc.thrown && sc.thrown.length) {
    const TW=30,TH=44,TV=14,tn=sc.thrown.length;
    tzone.classList.remove('empty');
    trow.style.cssText = `width:${TV*(tn-1)+TW}px;height:${TH}px;`;
    sc.thrown.forEach((c,i)=>{
      const el = document.createElement('div');
      el.className='thr-c'+(c.red?' red':'');
      el.style.cssText=`left:${i*TV}px;width:${TW}px;height:${TH}px;z-index:${i};`;
      el.innerHTML=`<span>${c.r}</span><span>${c.s}</span>`;
      trow.appendChild(el);
    });
  } else {
    tzone.classList.add('empty');
  }
}

// ── Render player hand ─────────────────────────────────────────────────────────
function buildHand() {
  const fan = document.getElementById('handFan');
  fan.innerHTML = '';
  const n=MY_CARDS.length, spread=210, maxRot=22;
  MY_CARDS.forEach((c,i) => {
    const t   = n>1 ? i/(n-1) : 0.5;
    const rot = (t-.5)*maxRot*2, xOff=(t-.5)*spread, yOff=Math.pow(t-.5,2)*30;
    const el  = document.createElement('div');
    el.className = 'hand-card'+(c.red?' red':'');
    el.style.cssText = `transform:translateX(${xOff}px) translateY(${yOff}px) rotate(${rot}deg);z-index:${i+1};left:calc(50% - 34px);`;
    el.innerHTML = `<div>${c.r}<br>${c.s}</div><div class="hsc">${c.s}</div><div style="transform:rotate(180deg)">${c.r}<br>${c.s}</div>`;
    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      fan.querySelectorAll('.hand-card.lifted').forEach(restoreCard);
      el.classList.add('lifted');
      el.style.transform = `translateX(${xOff}px) translateY(${yOff-44}px) rotate(${rot}deg)`;
      el.style.zIndex = 60;
    });
    fan.appendChild(el);
  });
  function restoreCard(el) {
    const idx = [...el.parentNode.children].indexOf(el);
    const t   = n>1 ? idx/(n-1) : 0.5;
    el.style.transform = `translateX(${(t-.5)*spread}px) translateY(${Math.pow(t-.5,2)*30}px) rotate(${(t-.5)*maxRot*2}deg)`;
    el.style.zIndex = idx+1; el.classList.remove('lifted');
  }
  document.addEventListener('pointerup', () => fan.querySelectorAll('.hand-card.lifted').forEach(restoreCard));
}

// ── Controls ───────────────────────────────────────────────────────────────────
function setCount(n) {
  count = n;
  [2,3,4,5,6].forEach(k => document.getElementById('btn'+k).classList.toggle('active', k===n));
  render();
}

function setScenario(s) { scenario = s; render(); }

function toggleZones(btn) {
  const phone = document.getElementById('phone');
  phone.classList.toggle('zones-on');
  btn.classList.toggle('on');
}

function render() {
  const layout = LAYOUTS[count];
  renderTopBots(layout.top);
  renderSideBots(layout.side);
  renderTable();
}

buildHand();
render();
</script>
</body>
</html>
