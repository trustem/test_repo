<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бардак — Переводной Дурак</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOBBY SCREEN -->
<div id="lobby-screen" class="screen active">
  <div class="setup-container lobby-container">
    <h1 class="game-title">Бардак</h1>
    <h2 class="game-subtitle">Переводной Дурак</h2>

    <div class="setup-section" style="margin-bottom:14px">
      <label class="setup-label">Ваше имя:</label>
      <input id="lobby-name-input" type="text" maxlength="12" placeholder="Игрок"
             class="lobby-text-input">
    </div>

    <div class="lobby-rooms-section">
      <div class="lobby-rooms-header">
        <span class="lobby-rooms-title">Открытые игры</span>
        <button id="refresh-rooms-btn" class="refresh-btn" title="Обновить">↻</button>
      </div>
      <div id="rooms-list" class="rooms-list">
        <div class="rooms-loading">Подключение...</div>
      </div>
    </div>

    <button id="create-room-btn" class="start-button lobby-create-btn">+ Создать игру</button>
    <button id="solo-btn" class="start-button lobby-solo-btn">Играть с ботами</button>
  </div>
</div>

<!-- WAITING SCREEN -->
<div id="waiting-screen" class="screen">
  <div class="setup-container" style="text-align:center">
    <h1 class="game-title">Бардак</h1>
    <div id="waiting-count" style="color:#a0a090;margin-bottom:12px;margin-top:16px">1/4 игроков</div>
    <div id="waiting-players" style="margin-bottom:20px"></div>
    <div style="margin-bottom:12px">
      <label style="color:#a0a090;font-size:0.85rem">Мест в комнате:</label>
      <div class="player-count-buttons" style="justify-content:center;margin-top:8px" id="room-size-btns">
        <button class="count-btn" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn active" data-count="4">4</button>
        <button class="count-btn" data-count="5">5</button>
        <button class="count-btn" data-count="6">6</button>
      </div>
    </div>
    <button id="start-game-btn" class="start-button" style="display:none">Начать игру!</button>
    <div id="waiting-msg" style="color:#a0a090;font-size:0.85rem;margin-top:8px">Ожидание других игроков...</div>
  </div>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen">
  <div class="setup-container">
    <h1 class="game-title">Бардак</h1>
    <h2 class="game-subtitle">Переводной Дурак</h2>
    <div class="setup-section">
      <label class="setup-label">Количество игроков:</label>
      <div class="player-count-buttons">
        <button class="count-btn active" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
        <button class="count-btn" data-count="5">5</button>
        <button class="count-btn" data-count="6">6</button>
      </div>
    </div>
    <div class="setup-section">
      <div id="player-slots"></div>
    </div>
    <button id="start-btn" class="start-button">Начать игру!</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <span class="top-bar-title">Бардак</span>
    <button id="new-game-btn" class="new-game-btn">Новая игра</button>
    <button id="debug-btn" class="debug-btn">🔍 Отладка</button>
  </div>

  <!-- Players positioned around the oval -->
  <div id="players-area" class="players-area"></div>

  <!-- Deck zone — left side (desktop: center-info; mobile: fixed left) -->
  <div id="center-info" class="center-info">
    <div class="pile-zone">
      <div id="discard-visual" class="discard-visual"></div>
      <div class="pile-label">Бита: <span id="discard-count">0</span></div>
    </div>
    <div class="pile-zone deck-zone">
      <div class="deck-stack">
        <div id="deck-visual" class="deck-visual"><div class="deck-back"></div></div>
        <div id="trump-card-panel" class="trump-card-rotated"></div>
      </div>
      <div class="pile-label">Колода: <span id="deck-count">40</span></div>
      <div class="trump-info">Козырь: <span id="trump-panel-suit" class="trump-panel-suit"></span></div>
    </div>
  </div>

  <!-- Mobile-only: separate positioned deck zone -->
  <div id="deck-zone-mobile" class="deck-zone-mobile" style="display:none">
    <div class="deck-count-mobile" id="deck-count-mobile">40</div>
    <div class="deck-stack-mobile" id="deck-stack-mobile" id="deck"></div>
    <div id="trump-card-display" class="trump-card-display"></div>
    <div class="trump-label-mobile">Козырь</div>
  </div>

  <!-- Mobile-only: separate positioned discard zone -->
  <div id="discard-zone-mobile" class="discard-zone-mobile" style="display:none">
    <div class="discard-stack-mobile" id="discard-stack-mobile"></div>
    <div class="discard-label-mobile">Бита: <span id="discard-count-mobile">0</span></div>
  </div>

  <div id="untouchable-panel" class="untouchable-panel"></div>

  <!-- Table cards (attack / defense) -->
  <div class="table-area">
    <div id="action-hint" class="action-hint"></div>
    <div id="table-cards" class="table-cards"></div>
  </div>

  <!-- Mobile-only: thrown-to-me panel -->
  <div id="thrown-to-me-wrap" style="display:none; position:absolute; left:8px; bottom:120px; z-index:15; flex-direction:column; align-items:flex-start; gap:3px;">
    <div class="thrown-to-me-label">▼ накинуто вам</div>
    <div id="thrown-to-me-fan" style="position:relative;"></div>
  </div>

  <!-- Action buttons above hand -->
  <div id="action-buttons" class="action-buttons"></div>

  <!-- Human hand -->
  <div class="human-area">
    <div id="human-hand" class="human-hand"></div>
  </div>

  <div class="log-area">
    <div class="log-header">Журнал игры <button id="log-close-btn" class="log-close-btn">✕</button></div>
    <div class="log-body">
      <div id="game-log" class="game-log"></div>
      <div class="log-slider" id="log-slider">
        <div class="log-slider-track" id="log-slider-track">
          <div class="log-slider-thumb" id="log-slider-thumb"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Log toggle: bottom-right corner (?) -->
  <button id="log-toggle-btn" class="log-toggle-btn" title="Журнал">?</button>

  <div id="phase-indicator" style="display:none"></div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen">
  <div class="gameover-container">
    <h1 id="gameover-title" class="gameover-title"></h1>
    <div id="gameover-details" class="gameover-details"></div>
    <div id="scores-display" class="scores-display"></div>
    <button id="play-again-btn" class="start-button">Играть снова</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="multiplayer.js"></script>
<script src="game.js"></script>
</body>
</html>
